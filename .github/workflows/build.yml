name: 构建模块

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/module/**'
      - 'src/webui/**'
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: 构建
    runs-on: ubuntu-latest
    outputs:
      commit_count: ${{ steps.get_version.outputs.commit_count }}
    steps:
      - name: 拉取代码
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 设置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/webui/package-lock.json
      
      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: 安装 WebUI 依赖
        working-directory: src/webui
        run: npm install

      - name: 更新 versionCode
        id: get_version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          sed -i "s/^versionCode=.*/versionCode=$COMMIT_COUNT/" src/module/module.prop
          echo "versionCode 已更新为: $COMMIT_COUNT"
          echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT

      - name: 构建 WebUI
        run: python src/webui/build_webui.py

      - name: 上传构建产物
        uses: actions/upload-artifact@v7
        with:
          name: NetProxy-Module
          path: src/module/
